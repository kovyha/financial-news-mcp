# financial-news-mcp configuration
#
# Copy this file to config.toml and adjust values as needed.
# config.toml is gitignored — do not commit it.
#
# FINNHUB_API_KEY is not configured here — keep secrets in the environment.
# Example: export FINNHUB_API_KEY='your_key'

[logging]

# Directory where log files are written (relative to working directory).
log_dir = "logs"

# Maximum size of each log file in bytes before it is rolled and compressed.
# Default: 10485760 (10 MB)
max_bytes = 10485760

# Base name for log files.
# Produces <filename>.log (all levels) and <filename>.error.log (errors only).
filename = "financial_news"

# Log level: INFO (normal operation) or DEBUG (verbose, for development).
# INFO  — logs tool invocations, computed statistics, and errors.
# DEBUG — additionally logs raw fetch requests, article counts, and headlines
#         passed to the model.
level = "INFO"

[analysis]

# Cap applied to infinite z-scores (zero-baseline spikes) before exporting to
# Grafana Cloud and before passing values to LLM prompts. Must be > 0.
# Default: 99.0
z_score_cap = 99.0

[monitor]

# Tickers to watch during the daily monitoring run.
# Remove or add symbols as needed — each must be a valid Finnhub symbol.
tickers = ["NVDA", "TSLA", "META", "AMD", "F", "BAC", "GME", "PLUG", "XOM", "UNH"]

# Path where the monitor writes its stats snapshot after each run.
# The briefing agent reads this file (if fresh) instead of re-fetching from Finnhub.
# Default: /tmp/financial_news_snapshot.json
# snapshot_path = "/tmp/financial_news_snapshot.json"

[briefing]

# How many days back to fetch headlines for elevated/unusual tickers.
# Default: 7
headline_days = 7

# Maximum number of headlines to pass to Claude per ticker lookup.
# Default: 50
max_headlines = 50

# [email]
# Send a summary email after each monitor run. Remove the comment markers to
# enable. Credentials come from environment variables (not stored here):
#   SMTP_USER     — login username, usually the sender address
#   SMTP_PASSWORD — login password or app password
#
# recipients = ["you@example.com", "teammate@example.com"]
# smtp_host   = "smtp.gmail.com"
# smtp_port   = 587          # default; TLS STARTTLS
# smtp_from   = ""           # optional override; defaults to SMTP_USER
