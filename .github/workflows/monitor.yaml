name: Monitor & Briefing (Daily)

# Runs daily after US market close.
# Monitor step: fetches news volume stats and pushes OTel gauges to Grafana Cloud.
# Briefing step: calls Claude to produce a plain-language summary (on by default).
#
# To skip the briefing on a specific run: trigger via workflow_dispatch and set
# run_briefing to false.
#
# IMPORTANT: This workflow is disabled by default.
# To enable: Go to Actions tab → select this workflow → "Enable workflow"
on:
  schedule:
    # 12:00 UTC daily (8am ET) — pre-US market open, financial news breaks on weekends too
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      run_briefing:
        description: 'Run the briefing agent after the monitor'
        type: boolean
        default: true

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run monitoring agent
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GRAFANA_CLOUD_OTLP_ENDPOINT: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          GRAFANA_CLOUD_BASIC_AUTH_HEADER: ${{ secrets.GRAFANA_CLOUD_BASIC_AUTH_HEADER }}
        run: uv run python -m financial_news.monitor

      - name: Run briefing agent
        if: ${{ github.event.inputs.run_briefing != 'false' }}
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: uv run python -m financial_news.briefing

      - name: Run diagnostic agent on failure
        if: failure()
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m financial_news.diagnostic
